        tamil      → Tamil (தமிழ்)
        telugu     → Telugu (తెలుగు)
        malayalam  → Malayalam (മലയാളം)
        devanagari → Hindi (हिंदी)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Tamil:wght@100..900&family=Noto+Sans+Telugu:wght@100..900&family=Noto+Sans+Malayalam:wght@100..900&family=Noto+Sans+Devanagari:wght@100..900&display=swap"
      rel="stylesheet"
    />
